run_name: OLMo-20M-neuron
seed: 6198
dry_run: false

wandb: null

model:
  d_model: 256
  n_heads: 8
  n_layers: 8
  mlp_ratio: 8
  weight_tying: false
  alibi: false
  rope: true
  flash_attention: true
  attention_dropout: 0.0
  attention_layer_norm: false
  clip_qkv: null
  include_bias: false
  block_type: sequential
  layer_norm_type: rms
  layer_norm_with_affine: true
  layer_norm_eps: 1e-6
  bias_for_layer_norm: false
  attention_layer_norm_with_affine: false
  activation_type: swiglu
  residual_dropout: 0.0
  embedding_dropout: 0.0
  max_sequence_length: 2048
  vocab_size: 100278
  embedding_size: 100352
  eos_token_id: 100257
  pad_token_id: 1
  init_device: null
  init_fn: mitchell
  init_cutoff_factor: 3.0
  norm_after: false

compile: null

optimizer:
  name: adamw
  learning_rate: 4.0e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95

scheduler:
  name: cosine_with_warmup
  t_warmup: 2000
  alpha_f: 0.1

tokenizer:
  identifier: olmo_data/tokenizers/allenai_dolma2.json
  truncate_direction: right

save_folder: workspace/${run_name}
save_overwrite: true
save_interval: 50
save_num_checkpoints_to_keep: -1

load_path: null

max_duration: 50
global_train_batch_size: 128
device_train_microbatch_size: 8

precision: amp_fp16

fsdp:
  wrapping_strategy: null
  precision: mixed

max_grad_norm: 1.0
max_grad_norm_ratio: null

speed_monitor:
  window_size: 100

eval_interval: 50
eval_subset_num_batches: -1
device_eval_batch_size: 16
evaluators: []

data:
  pad_direction: right
  num_workers: 4
  drop_last: true
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: true
  timeout: 0
  paths:
    # Using single small data file for quick testing (~1.7GB)
    - http://olmo-data.org/preprocessed/proof-pile-2/v0_decontaminated/algebraic-stack/train/allenai/dolma2-tokenizer/part-00-00000.npy

