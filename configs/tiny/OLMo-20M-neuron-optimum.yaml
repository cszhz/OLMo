run_name: OLMo-20M-neuron-optimum
seed: 6198
dry_run: false

wandb: null

# Training strategy - optimum-neuron handles parallelization
distributed_strategy: single

model:
  d_model: 128
  n_heads: 4
  n_layers: 4
  mlp_ratio: 4
  weight_tying: false
  alibi: false
  rope: true
  flash_attention: false
  attention_dropout: 0.0
  attention_layer_norm: false
  clip_qkv: null
  include_bias: false
  block_type: sequential
  layer_norm_type: rms
  layer_norm_with_affine: true
  layer_norm_eps: 1e-6
  bias_for_layer_norm: false
  attention_layer_norm_with_affine: false
  activation_type: swiglu
  residual_dropout: 0.0
  embedding_dropout: 0.0
  max_sequence_length: 256
  vocab_size: 100278
  embedding_size: 100352
  eos_token_id: 100257
  pad_token_id: 1
  init_device: cpu
  init_fn: mitchell
  init_cutoff_factor: 3.0
  norm_after: false

compile: null

optimizer:
  name: adamw
  learning_rate: 4.0e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95

scheduler:
  name: cosine_with_warmup
  t_warmup: 2000
  alpha_f: 0.1

tokenizer:
  identifier: olmo_data/tokenizers/allenai_dolma2.json
  truncate_direction: right

save_folder: workspace/${run_name}
save_overwrite: true
save_interval: 20
save_interval_unsharded: 20
save_num_checkpoints_to_keep: -1
save_num_unsharded_checkpoints_to_keep: 2

load_path: null

# Training duration and batch size
max_duration: 50
global_train_batch_size: 16
device_train_microbatch_size: 1

# Precision - bfloat16 is recommended for Neuron
precision: amp_bf16

# Gradient clipping
max_grad_norm: null
max_grad_norm_ratio: null

speed_monitor:
  window_size: 100

eval_interval: 50
eval_subset_num_batches: -1
device_eval_batch_size: 8
evaluators: []

# Data configuration - optimum-neuron handles workers
data:
  pad_direction: right
  num_workers: 0  # Must be 0 for Neuron
  drop_last: true
  pin_memory: false
  prefetch_factor: null
  persistent_workers: false
  timeout: 0
  paths:
    - /home/ubuntu/part-00-00000.npy

# FSDP config (used to determine tensor parallel size in optimum-neuron)
fsdp:
  use_orig_params: true
  sharding_strategy: FULL_SHARD
  wrapping_strategy: null
  precision: pure
  hybrid_sharding_num_model_replicas: 8  # This becomes tensor_parallel_size

# Other settings
console_log_interval: 1
gen1_gc_interval: 1
no_pre_train_checkpoint: false
try_load_latest_save: false
reset_optimizer_state: false
reset_trainer_state: false
save_data_indices: true
